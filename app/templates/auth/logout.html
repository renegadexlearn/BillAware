{% extends "base.html" %}

{% block title %}{{ APP_NAME }} | Logout{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <h1 class="h3 mb-3">Signed out</h1>
                    <p class="text-muted mb-4">Your local BillAware session has been cleared.</p>
                    <a class="btn btn-outline-primary w-100" href="{{ common_auth_logout_url }}">
                        Continue to commonAuth logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
