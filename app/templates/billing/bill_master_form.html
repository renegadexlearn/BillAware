{% extends "base.html" %}

{% block title %}Create Bill Master{% endblock %}

{% block styles %}
<style>
    .page-wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 0.85rem 1rem 1.75rem;
    }

    .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 1rem;
        align-items: start;
        margin-bottom: 0.85rem;
        padding: 1rem 1.1rem;
        border: 1px solid #dbe4ef;
        border-radius: 18px;
        background:
            radial-gradient(circle at top right, rgba(59, 130, 246, 0.14), transparent 30%),
            linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.06);
    }

    .hero-title {
        margin: 0;
        font-size: 1.45rem;
        font-weight: 800;
        color: #0f172a;
    }

    .hero-copy {
        margin: 0.22rem 0 0;
        color: #64748b;
        font-size: 0.92rem;
    }

    .hero-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.42rem 0.78rem;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 0.78rem;
        font-weight: 800;
    }

    .surface {
        border: 1px solid #dbe4ef;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.05);
    }

    .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 0.8rem;
        padding: 0.85rem 1rem 0.7rem;
        border-bottom: 1px solid #e7edf5;
    }

    .panel-body {
        padding: 0.9rem 1rem 1rem;
    }

    .master-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
    }

    .field-card {
        padding: 0.7rem;
        border: 1px solid #e6edf5;
        border-radius: 14px;
        background: #fbfdff;
    }

    .field-card.wide {
        grid-column: 1 / -1;
    }

    .field-card.double {
        grid-column: span 2;
    }

    .field-card.tall {
        min-height: 100%;
    }

    .field-card.accent {
        background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
        border-color: #d8e7fb;
    }

    .mini-label {
        display: block;
        margin-bottom: 0.35rem;
        font-size: 0.74rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #64748b;
        font-weight: 800;
    }

    .summary-card {
        padding: 0.75rem 0.85rem;
        border: 1px solid #dbe4ef;
        border-radius: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .summary-label {
        margin: 0;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
        font-weight: 800;
    }

    .summary-value {
        margin: 0.22rem 0 0;
        font-size: 1.12rem;
        font-weight: 800;
        color: #0f172a;
    }

    .compact-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: auto;
        padding: 0.48rem 0.82rem;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
        color: #0f172a;
        font-size: 0.84rem;
        font-weight: 700;
        text-decoration: none;
    }

    .compact-btn.primary {
        background: #1d4ed8;
        border-color: #1d4ed8;
        color: #fff;
    }

    .form-actions {
        display: flex;
        justify-content: flex-start;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.85rem;
    }

    .action-buttons {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
    }

    .form-total-card {
        background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
        border-color: #fdba74;
    }

    .supplier-field {
        position: relative;
    }

    .supplier-field .form-control.is-existing-supplier {
        border-color: #7dd3fc;
        background: linear-gradient(180deg, #f0f9ff 0%, #e0f2fe 100%);
        color: #0c4a6e;
        border-radius: 999px;
        padding-left: 0.95rem;
        padding-right: 2.4rem;
        font-weight: 700;
    }

    .supplier-clear-btn {
        position: absolute;
        top: 50%;
        right: 0.45rem;
        transform: translateY(-50%);
        width: 1.65rem;
        height: 1.65rem;
        border: 0;
        border-radius: 999px;
        background: #0ea5e9;
        color: #fff;
        font-size: 1rem;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(14, 165, 233, 0.25);
    }

    .supplier-clear-btn.is-hidden {
        display: none;
    }

    .supplier-status {
        display: inline-flex;
        align-items: center;
        min-height: 1.5rem;
        margin-top: 0.45rem;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        background: #e0f2fe;
        color: #075985;
        font-size: 0.78rem;
        font-weight: 700;
    }

    .supplier-status.is-hidden {
        display: none;
    }

    @media (max-width: 900px) {
        .hero,
        .master-grid {
            grid-template-columns: 1fr;
        }

        .hero {
            padding: 0.9rem;
        }

        .field-card.double {
            grid-column: 1 / -1;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-wrap">
    <form method="post">
        <section class="surface">
            <div class="panel-head">
                <div>
                    <h2 class="h5 mb-1">New Receipt</h2>
                </div>
            </div>
            <div class="panel-body">
                <div class="master-grid">
                    <div class="field-card wide">
                        <label class="mini-label">Supplier</label>
                        <div class="supplier-field">
                            <input
                                type="text"
                                name="supplier_name"
                                id="supplier_name"
                                class="form-control"
                                list="supplier_options"
                                value="{{ supplier_name or '' }}"
                                placeholder="Type supplier name"
                                autocomplete="off"
                                required
                            >
                            <button type="button" id="supplier_clear" class="supplier-clear-btn is-hidden" aria-label="Clear supplier" title="Clear supplier">&times;</button>
                            <input type="hidden" name="supplier_id" id="supplier_id" value="{{ bill.supplier_id or '' }}">
                            <datalist id="supplier_options">
                                {% for supplier in suppliers %}
                                <option value="{{ supplier.name }}"></option>
                                {% endfor %}
                            </datalist>
                        </div>
                        <div id="supplier_status" class="supplier-status is-hidden"></div>
                    </div>
                    <div class="field-card">
                        <label class="mini-label">Receipt Type</label>
                        <select name="document_type_id" class="form-select" required>
                            <option value="">Select document type</option>
                            {% for item in document_types %}
                            <option value="{{ item.id }}" {% if bill.document_type_id == item.id %}selected{% endif %}>{{ item.code }} - {{ item.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="field-card">
                        <label class="mini-label">Receipt Number</label>
                        <input type="text" name="bill_number" class="form-control" value="{{ bill.bill_number or '' }}">
                    </div>
                    <div class="field-card">
                        <label class="mini-label">Bill Date</label>
                        <input type="date" name="bill_date" class="form-control" value="{{ bill.bill_date.isoformat() if bill.bill_date else '' }}" required>
                    </div>
                    <div class="field-card double">
                        <label class="mini-label">Notes</label>
                        <input type="text" name="notes" class="form-control" value="{{ bill.notes or '' }}">
                    </div>
                    <div class="summary-card form-total-card">
                        <label class="mini-label">Total Amount</label>
                        <input type="number" step="0.01" min="0.01" name="encoded_total_amount" class="form-control" value="{{ bill.encoded_total_amount if bill.encoded_total_amount is not none else '' }}" required>
                    </div>
                </div>
                <input type="hidden" name="subtotal_discount_amount" value="{{ bill.subtotal_discount_amount or 0 }}">
                <input type="hidden" name="additional_tax_type" value="{{ bill.additional_tax_type or 'none' }}">
                <input type="hidden" name="additional_tax_value" value="{{ bill.additional_tax_value or 0 }}">

                <div class="form-actions">
                    <div class="action-buttons">
                        <button type="submit" class="compact-btn primary">Save and Add Details</button>
                        <a href="{{ url_for('billing.bill_list') }}" class="compact-btn">Cancel</a>
                    </div>
                </div>
            </div>
        </section>
    </form>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    (() => {
        const supplierInput = document.getElementById("supplier_name");
        const supplierIdInput = document.getElementById("supplier_id");
        const supplierStatus = document.getElementById("supplier_status");
        const supplierClear = document.getElementById("supplier_clear");
        const suppliers = {{ suppliers_json|safe }};
        const suppliersByName = new Map(
            suppliers.map((item) => [item.name.trim().toLocaleLowerCase(), item])
        );

        function syncSupplierState() {
            const typedValue = supplierInput.value.trim();
            const matchedSupplier = suppliersByName.get(typedValue.toLocaleLowerCase());

            if (matchedSupplier) {
                supplierIdInput.value = matchedSupplier.id;
                supplierStatus.textContent = "Existing supplier";
                supplierStatus.classList.remove("is-hidden");
                supplierInput.classList.add("is-existing-supplier");
                supplierInput.readOnly = true;
                supplierInput.removeAttribute("list");
                supplierClear.classList.remove("is-hidden");
                return;
            }

            supplierIdInput.value = "";
            supplierStatus.textContent = "";
            supplierStatus.classList.add("is-hidden");
            supplierInput.classList.remove("is-existing-supplier");
            supplierInput.readOnly = false;
            supplierInput.setAttribute("list", "supplier_options");
            supplierClear.classList.add("is-hidden");
        }

        supplierInput.addEventListener("input", syncSupplierState);
        supplierInput.addEventListener("change", syncSupplierState);
        supplierClear.addEventListener("click", () => {
            supplierInput.value = "";
            supplierIdInput.value = "";
            supplierInput.readOnly = false;
            supplierInput.setAttribute("list", "supplier_options");
            supplierInput.classList.remove("is-existing-supplier");
            supplierStatus.textContent = "";
            supplierStatus.classList.add("is-hidden");
            supplierClear.classList.add("is-hidden");
            supplierInput.focus();
        });
        syncSupplierState();
    })();
</script>
{% endblock %}
